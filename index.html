<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>我的导航网</title>
<style>
body{font-family:微软雅黑;background:#f4f6f8;margin:0;padding:30px;}
.container{max-width:900px;margin:0 auto;}
.title{text-align:center;font-size:28px;margin-bottom:30px;color:#333;}
.box{background:white;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 10px #00000008;}
.box h2{font-size:18px;color:#555;margin-bottom:15px;}
.links{display:flex;flex-wrap:wrap;gap:10px;}
.links a{background:#eef6ff;color:#0077ed;padding:10px 16px;border-radius:8px;text-decoration:none;}
.links a:hover{background:#0077ed;color:white;}
</style>
</head>
<body>
<div class="container">
  <div class="title">我的导航网站</div>

  <div class="box">
    <h2>常用网站</h2>
    <div class="links">
      <a href="https://www.baidu.com" target="_blank">百度</a>
      <a href="https://www.bilibili.com" target="_blank">B站</a>
      <a href="https://www.zhihu.com" target="_blank">知乎</a>
      <a href="https://www.douyin.com" target="_blank">抖音</a>
    </div>
  </div>

  <div class="box">
    <h2>工具</h2>
    <div class="links">
      <a href="https://github.com" target="_blank">GitHub</a>
      <a href="https://translate.google.com" target="_blank">翻译</a>
    </div>
  </div>
</div>
</body>
</html>
