<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>导航网</title>
<style>
body{
    font-family:微软雅黑;
    background:url(yingwen.png) no-repeat center center fixed;
    background-size: cover;
    margin:0;
    padding:30px;
}
.container{max-width:900px;margin:0 auto;}

.title{
    text-align:center;
    font-size: 46px;
    font-weight: bold;
    margin-bottom:30px;
    background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

/* 美化后的盒子 */
.box{
    background: rgba(255, 255, 255, 0.85);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 24px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.2);
    text-align: center;
}

.box h2{
    font-size: 24px;
    font-weight: bold;
    color:#222;
    margin-bottom:18px;
}

.links{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content: center;
}

.links a{
    background:#0077ed;
    color:#fff;
    padding:12px 22px;
    border-radius: 12px;
    text-decoration:none;
    font-size: 16px;
    font-weight: 500;
    transition: all 0.2s ease;
}
.links a:hover{
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0,119,237,0.3);
}
</style>
</head>
<body>
<div class="container">
  <div class="title">欢迎光临本站，祝大家马年大吉</div>

  <div class="box">
    <h2>常用网站</h2>
    <div class="links">
      <a href="https://www.baidu.com" target="_blank">立即进入</a>
    </div>
  </div>

  <div class="box">
    <h2>工具</h2>
    <div class="links">
      <a href="https://github.com" target="_blank">GitHub</a>
    </div>
  </div>
</div>
</body>
</html>
