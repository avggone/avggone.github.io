<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>导航页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#f5f5f7}
.top-banner{
background:url("bj.jpg") center center / cover no-repeat;
width:100%;
padding:80px 20px 60px;
}
.top-title{font-size:44px;color:#fff;font-weight:600}
.main-card{
background:#fff;
margin:-30px 0 0;
padding-top:20px;
border-top-left-radius:30px;
border-top-right-radius:30px;
min-height:100vh;
position:relative;
z-index:1;
}
.notice-box{
background:#f5f5f7;
margin:0 20px 25px;
padding:8px 16px;
border-radius:12px;
display:flex;
align-items:center;
gap:10px;
font-size:17px;
overflow:hidden;
}
.notice-icon{font-size:22px;flex-shrink:0}
.scroll-text{flex:1;white-space:nowrap;overflow:hidden}
marquee{font-size:17px}
.container{padding:0 20px}
.module-title{font-size:24px;margin-bottom:12px}
.nav-btn{
background:linear-gradient(90deg,#ff388c,#2848ee);
width:100%;
border-radius:18px;
padding:22px 25px;
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:30px;
text-decoration:none;
}
.btn-left{display:flex;align-items:center;gap:18px}
.btn-icon{font-size:42px;color:#fff}
.btn-text-box{color:#fff}
.btn-main-text{font-size:32px;font-weight:500}
.btn-sub-text{font-size:18px;color:#eee}
.btn-arrow{font-size:36px;color:#fff}
</style>
</head>
<body>

<div class="top-banner">
<div class="top-title">欢迎光临本站</div>
</div>

<div class="main-card">
<div class="notice-box">
<span class="notice-icon">🔊</span>
<div class="scroll-text">
<marquee scrollamount="5">导航源码，提供源码出售、一条搭建服务</marquee>
</div>
</div>

<div class="container">
<div class="module-title">黑丝嫩穴强奸乱伦</div>
<a href="https://www.baidu.com" target="_blank" class="nav-btn">
<div class="btn-left">
<span class="btn-icon">🎬</span>
<div class="btn-text-box">
<div class="btn-main-text">高清海量大片</div>
<div class="btn-sub-text">立即进入</div>
</div>
</div>
<span class="btn-arrow">▶️</span>
</a>

<div class="module-title">影视福利社</div>
<!-- 这里已改为跳转到 qpym.html -->
<a href="qpym.html" class="nav-btn">
<div class="btn-left">
<span class="btn-icon">🀄</span>
<div class="btn-text-box">
<div class="btn-main-text">红中麻将1元1分</div>
<div class="btn-sub-text">真实千人在线</div>
</div>
</div>
<span class="btn-arrow">▶️</span>
</a>
</div>
</div>

</body>
</html>
