<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>联系站长</title>
<style>
body{
    font-family:微软雅黑;
    background:#f7f8fa;
    text-align:center;
    padding:40px 20px;
}
.box{
    background:white;
    max-width:400px;
    margin:0 auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 4px 20px rgba(0,0,0,0.05);
}
.title{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
    color:#333;
}
.qrcode{
    width:200px;
    height:200px;
    margin:20px auto;
}
.desc{
    font-size:16px;
    color:#555;
    line-height:1.8;
    margin-top:20px;
}
.back{
    margin-top:30px;
}
.back a{
    color:#0077ed;
    text-decoration:none;
}
</style>
</head>
<body>
<div class="box">
    <div class="title">联系站长</div>

    <img src="qrcode.jpg" class="qrcode" alt="二维码">

    <div class="desc">
        这里写你想显示的话<br>
        比如：扫码添加微信，有事随时联系我~
    </div>

    <div class="back">
        <a href="index.html">返回首页</a>
    </div>
</div>
</body>
</html>
